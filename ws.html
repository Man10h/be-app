<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />

    <!-- LOAD LIB TRƯỚC -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
<h2>WebSocket Test</h2>

<script>
    const TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJtYW5oIiwiaWQiOiI1YTRkMzNlYS1hNTQyLTQ5NzEtOWVkMi0zNDE5Y2YxNjZiNzMiLCJleHAiOjE3NzE4MzcwNTcsInJvbGVzIjpbIlVTRVIiXX0.mTAOCxkjb8qJubojzHHv3lDZVcX18vmCTm5cCVuE11s";

    const socket = new SockJS("http://localhost:8080/ws");
    const stompClient = Stomp.over(socket);
    stompClient.debug = null;

    stompClient.connect(
        {
            Authorization: "Bearer " + TOKEN
        },
        () => {
            console.log("✅ WS CONNECTED");

            stompClient.subscribe("/user/queue/notifications", msg => {
                console.log("🔔 NOTIFICATION", JSON.parse(msg.body));
            });
        },
        err => console.error("❌ WS ERROR", err)
    );
</script>

</body>
